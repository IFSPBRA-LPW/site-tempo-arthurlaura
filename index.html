<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Now</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./scripts/index.js" defer></script>
</head>
<body>

    <header id="header">
        <h4>🌤 Weather Now</h4>
        <p>⚙ Units ▾</p>
    </header>

    <section id="section-titulo">
        <h1>How's the sky looking today?</h1>
    </section>

    <section id="section-pesquisa">
        <input type="text" id="city-input" placeholder="Search for a place...">
        <button id="search-button"><p>Search</p></button>
    </section>

    <div class="main-content">
        <section id="section-imagem">
            <span class="weather-icon"></span>
            <p class="city-name">Loading...</p>
            <p class="city-date"></p>
            <p class="temp-main">--°</p>
        </section>

        <section id="section-dados">
            </section>

        <p class="daily-label">Daily forecast</p>
        <section id="section-semanal">
            </section>

        <section id="section-dia">
            <h4>Hourly forecast</h4>
            </section>
    </div>
</body>
</html>
